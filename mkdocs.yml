site_name: Shooter Performance Feature Engineering
site_description: VR shooting-range event logs -> interpretable shot-quality features -> shooter & PM report.
repo_url: https://github.com/GalKepler/eyeviation
docs_dir: docs

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Data & Pipeline: data-and-pipeline.md
  - Full Analysis (notebook): analysis.ipynb
  - Code Reference: code-reference.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            filters: ["!^__"]
            members_order: source
            docstring_section_style: list
